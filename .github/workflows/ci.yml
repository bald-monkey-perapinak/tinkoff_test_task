name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck (${{ matrix.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            python-version: "3.11"
          - component: frontend
            node-version: "20"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        if: matrix.component == 'backend'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.component }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.component }}-

      - name: Install ruff
        if: matrix.component == 'backend'
        run: pip install ruff

      - name: Run ruff check
        if: matrix.component == 'backend'
        run: ruff check backend/

      - name: Run ruff format check
        if: matrix.component == 'backend'
        run: ruff format --check backend/

      - name: Set up Node.js ${{ matrix.node-version }}
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.component == 'frontend'
        run: npm ci
        working-directory: frontend

      - name: Build frontend (includes tsc)
        if: matrix.component == 'frontend'
        run: npm run build
        working-directory: frontend

  test:
    name: Test (${{ matrix.component }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            python-version: "3.11"
          - component: frontend
            node-version: "20"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        if: matrix.component == 'backend'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        if: matrix.component == 'backend'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.component }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.component }}-

      - name: Install backend dependencies
        if: matrix.component == 'backend'
        run: pip install -r backend/requirements.txt

      - name: Run pytest
        if: matrix.component == 'backend'
        run: pytest backend/tests/ -v --tb=short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: Set up Node.js ${{ matrix.node-version }}
        if: matrix.component == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: matrix.component == 'frontend'
        run: npm ci
        working-directory: frontend

      - name: Verify frontend build
        if: matrix.component == 'frontend'
        run: npm run build
        working-directory: frontend

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile
          push: false
          load: true
          tags: vacancy-agent-backend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: false
          load: true
          tags: vacancy-agent-frontend:${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Verify backend container starts
        run: |
          docker run -d --name backend-test \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -e TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }} \
            vacancy-agent-backend:${{ github.sha }}
          sleep 10
          docker logs backend-test
          docker inspect --format='{{.State.Running}}' backend-test | grep true
          docker stop backend-test

      - name: Verify frontend container starts
        run: |
          docker run -d --name frontend-test \
            vacancy-agent-frontend:${{ github.sha }}
          sleep 5
          docker logs frontend-test
          docker inspect --format='{{.State.Running}}' frontend-test | grep true
          docker stop frontend-test

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
